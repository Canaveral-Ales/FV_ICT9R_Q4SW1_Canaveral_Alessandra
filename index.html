<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
 
<style>
body {
  margin: 0;
  font-family: Georgia, 'Times New Roman', Times, serif;
  background-color: #fedef1, #e4e4ff;
  height: auto;
  display: flex;
  align-items: center;
}

.login-box {
  background: #e3e3f6;
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(249, 214, 243, 0.2);
  color: rgb(79, 64, 64);
}


label {
  display: block;
  margin-top: 10px;
  font-size: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 20px;
  text-align: center;
}

.login-button {
  background: #f7d3d3;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  color: rgb(79, 64, 64);
  cursor: pointer;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 9px;
}

.cancel-button {
    color: rgb(79, 64, 64)
  background: #b8b8b8;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

.forgot {
  display: block;
  margin-top: 15px;
  font-size: 12px;
  color: rgb(79, 64, 64);
  text-decoration: none;
}
</style>

</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <form onsubmit="login(event)">
    <label>Username</label>
    <input type="text" id="username" placeholder="Type here..." required>

    <label>Password</label>
    <input type="password" id="password" placeholder="********" required>

    <div class="options">
      <input type="checkbox">Stay logged in
    </div>

    <p class="note" style="color: rgb(79, 64, 64)">Your session will stay active on this device.</p>

    <div class="buttons">
      <button type="submit" class="login-button">Login</button>
     
      <button type="button" class="cancel-button">Cancel</button>
    </div>

    <a href="#" class="forgot">Forgot username / password?</a>
  </form>
</div>

<script>
function login(e)

{
  e.preventDefault();

var user = document.getElementById("username").value;
 var pass = document.getElementById("password").value;

 if (isNaN(user)) {
  alert("Username must include 'eraserheads.'");
} 
else if (user === "iloveeraserheads" && pass === "stickerhappy") {
  alert("Welcome, " + user + "!");
} 

else {
  alert("Incorrect username or password.");
}
}
</script>

</body>
</html>
